<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dettaglio Squadra</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body class="team-page">

    <div th:replace="~{fragments :: navbar}"></div>

    <div class="hero team-hero">
        <h1 th:text="${squadra.nome}">Nome Squadra</h1>
        <p>Roster dei giocatori e dettagli della squadra.</p>
    </div>

    <div class="container team-container">

        <div class="card torneo-card" style="max-width: 600px; margin: 0 auto 20px; text-align: left; padding: 20px;">
            <p><strong>Anno Fondazione:</strong> <span th:text="${squadra.annoFondazione != null ? squadra.annoFondazione : ''}">2026</span></p>
            <p><strong>Città:</strong> <span th:text="${squadra.citta != null ? squadra.citta : ''}">Roma</span></p>
        </div>

        <h2>Roster Giocatori:</h2>

        <div th:if="${squadra.giocatori.isEmpty()}">
            <p class="empty-state">Nessun giocatore registrato per questa squadra.</p>
        </div>

        <ul th:unless="${squadra.giocatori.isEmpty()}" class="team-roster">
            <li th:each="giocatore : ${squadra.giocatori}" class="team-player-card">
                <span class="ruolo" th:text="${giocatore.ruolo}">Ruolo</span>
                <a th:href="@{/giocatore/{id}(id=${giocatore.id})}" class="team-player-link">
                    <span th:text="${giocatore.nome} + ' ' + ${giocatore.cognome}">Nome Cognome</span>
                </a>
            </li>
        </ul>

        <a href="javascript:history.back()" class="back-link">&larr; Torna indietro</a>
    </div>

</body>
</html>
