<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuova Squadra</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .form-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 400px; }
        h2 { color: #333; margin-bottom: 20px; border-bottom: 2px solid #ffc107; padding-bottom: 10px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #555; font-weight: bold; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2 th:text="${squadra.id == null ? 'Inserisci Nuova Squadra' : 'Modifica Squadra'}">Inserisci Nuova Squadra</h2>
        
        <form th:action="@{/admin/squadre/salva}" method="POST" th:object="${squadra}">
            
            <input type="hidden" th:field="*{id}">
            
            <div class="input-group">
                <label>Nome Squadra</label>
                <input type="text" th:field="*{nome}" required>
            </div>
            
            <div class="input-group">
                <label>Città</label>
                <input type="text" th:field="*{citta}" required>
            </div>

            <div class="input-group">
                <label>Anno di Fondazione</label>
                <input type="number" th:field="*{annoFondazione}" required min="1800" max="2100">
            </div>

            <button type="submit">Salva Squadra</button>
        </form>

        <p style="text-align: center; margin-top: 20px;">
            <a th:href="@{/admin/squadre}" style="color: #6c757d; text-decoration: none;">&larr; Annulla</a>
        </p>
    </div>

</body>
</html>
