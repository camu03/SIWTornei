<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestione Tornei - Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>

    <div th:replace="~{fragments :: navbar}"></div>

    <div class="container">
        <h1>Gestione Tornei</h1>
        
        <a th:href="@{/admin/tornei/nuovo}" class="btn btn-add">+ Crea Nuovo Torneo</a>

        <table>
            <thead>
                <tr>
                    <th>Nome Torneo</th>
                    <th>Anno</th>
                    <th>Azioni</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="torneo : ${tornei}">
                    <td th:text="${torneo.nome}">Coppa Invernale</td>
                    <td th:text="${torneo.anno}">2026</td>
                    <td style="text-align: right;"><div class="azioni-container">
                            <a th:href="@{/admin/tornei/modifica/{id}(id=${torneo.id})}" class="btn btn-edit">Modifica</a>
                            <form th:action="@{/admin/tornei/{id}/delete(id=${torneo.id})}" method="post"
                                  onsubmit="return confirm('Sicuro di voler eliminare questo torneo?');">
                                <button type="submit" class="btn btn-del">Elimina</button>
                            </form>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>

        <p style="margin-top: 30px;">
            <a th:href="@{/admin/dashboard}" class="back-link">&larr; Torna alla Dashboard</a>
        </p>
    </div>

</body>
</html>
