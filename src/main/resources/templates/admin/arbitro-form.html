<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Modulo Arbitro</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>

    <div th:replace="~{fragments :: navbar}"></div>

    <div class="form-container">
        <h2 th:text="${arbitro.id == null ? 'Inserisci Nuovo Arbitro' : 'Modifica Arbitro'}">Inserisci Nuovo Arbitro</h2>
        
        <form th:action="@{/admin/arbitro/salva}" method="POST" th:object="${arbitro}">
            
            <input type="hidden" th:field="*{id}">
            
            <div class="input-group">
                <label>Nome</label>
                <input type="text" th:field="*{nome}" required>
            </div>
            
            <div class="input-group">
                <label>Cognome</label>
                <input type="text" th:field="*{cognome}" required>
            </div>

            <div class="input-group">
                <label>Codice Arbitrale</label>
                <input type="text" th:field="*{codiceArbitrale}" required>
            </div>

            <button type="submit">Salva Arbitro</button>
        </form>

        <p style="text-align: center; margin-top: 20px;">
            <a th:href="@{/admin/arbitri}" style="color: #6c757d; text-decoration: none;">&larr; Annulla</a>
        </p>
    </div>

</body>
</html>
