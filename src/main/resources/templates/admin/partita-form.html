<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Modulo Partita</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .form-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 600px; max-width: 100%; }
        h2 { color: #333; margin-bottom: 20px; border-bottom: 2px solid #ffc107; padding-bottom: 10px; }
        .input-group { margin-bottom: 15px; }
        .flex-group { display: flex; gap: 15px; }
        .flex-group .input-group { flex: 1; }
        label { display: block; margin-bottom: 5px; color: #555; font-weight: bold; font-size: 14px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-family: inherit; }
        button { width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 10px; font-weight: bold; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2 th:text="${partita.id == null ? 'Inserisci Nuova Partita' : 'Modifica Partita'}">Partita</h2>
        
        <form th:action="@{/admin/partite/salva}" method="POST" th:object="${partita}">
            <input type="hidden" th:field="*{id}">
            
            <div class="flex-group">
                <div class="input-group">
                    <label>Data e Ora</label>
                    <input type="datetime-local" th:field="*{dataOra}" required>
                </div>
                <div class="input-group">
                    <label>Luogo (Stadio/Campo)</label>
                    <input type="text" th:field="*{luogo}" required>
                </div>
            </div>

            <div class="flex-group">
                <div class="input-group">
                    <label>Torneo</label>
                    <select th:field="*{torneo}" required>
                        <option value="">-- Seleziona torneo --</option>
                        <option th:each="t : ${tornei}" th:value="${t.id}" th:text="${t.nome}"></option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Stato Partita</label>
                    <select th:field="*{stato}" required>
                        <option value="">-- Seleziona stato --</option>
                        <option th:each="st : ${stati}" th:value="${st}" th:text="${st}"></option>
                    </select>
                </div>
            </div>

            <div class="flex-group">
                <div class="input-group">
                    <label>Squadra Home</label>
                    <select th:field="*{squadraHome}" required>
                        <option value="">-- Squadra Home --</option>
                        <option th:each="s : ${squadre}" th:value="${s.id}" th:text="${s.nome}"></option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Squadra Away</label>
                    <select th:field="*{squadraAway}" required>
                        <option value="">-- Squadra Away --</option>
                        <option th:each="s : ${squadre}" th:value="${s.id}" th:text="${s.nome}"></option>
                    </select>
                </div>
            </div>

            <div class="flex-group">
                <div class="input-group">
                    <label>Gol Home</label>
                    <input type="number" th:field="*{golHome}" min="0" required>
                </div>
                <div class="input-group">
                    <label>Gol Away</label>
                    <input type="number" th:field="*{golAway}" min="0" required>
                </div>
            </div>

            <div class="input-group">
                <label>Arbitro (Opzionale)</label>
                <select th:field="*{arbitro}">
                    <option value="">-- Da assegnare --</option>
                    <option th:each="a : ${arbitri}" 
                            th:value="${a.id}" 
                            th:text="${a.nome + ' ' + a.cognome}">Nome Cognome
                    </option>
                </select>
            </div>

            <button type="submit">Salva Partita</button>
        </form>

        <p style="text-align: center; margin-top: 20px;">
            <a th:href="@{/admin/partite}" style="color: #6c757d; text-decoration: none;">&larr; Annulla</a>
        </p>
    </div>

</body>
</html>
