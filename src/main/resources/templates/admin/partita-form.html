<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Modulo Partita</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>

    <div th:replace="~{fragments :: navbar}"></div>

    <div class="form-container">
        <h2 th:text="${partita.id == null ? 'Inserisci Nuova Partita' : 'Modifica Partita'}">Partita</h2>
        
        <form th:action="@{/admin/partite/salva}" method="POST" th:object="${partita}">
            <input type="hidden" th:field="*{id}">
            
            <div class="flex-group">
                <div class="input-group">
                    <label>Data e Ora</label>
                    <input type="datetime-local" th:field="*{dataOra}" required>
                </div>
                <div class="input-group">
                    <label>Luogo (Stadio/Campo)</label>
                    <input type="text" th:field="*{luogo}" required>
                </div>
            </div>

            <div class="flex-group">
                <div class="input-group">
                    <label>Torneo</label>
                    <select id="torneoSelect" th:field="*{torneo}" required>
                        <option value="">-- Seleziona torneo --</option>
                        <option th:each="t : ${tornei}" th:value="${t.id}" th:text="${t.nome}"></option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Stato Partita</label>
                    <select th:field="*{stato}" required>
                        <option value="">-- Seleziona stato --</option>
                        <option th:each="st : ${stati}" th:value="${st}" th:text="${st}"></option>
                    </select>
                </div>
            </div>

            <div class="flex-group">
                <div class="input-group">
                    <label>Squadra Home</label>
                    <select id="squadraHomeSelect" th:field="*{squadraHome}" required>
                        <option value="">-- Seleziona prima il torneo --</option>
                        <option th:each="s : ${squadre}" th:value="${s.id}" th:text="${s.nome}"></option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Squadra Away</label>
                    <select id="squadraAwaySelect" th:field="*{squadraAway}" required>
                        <option value="">-- Seleziona prima il torneo --</option>
                        <option th:each="s : ${squadre}" th:value="${s.id}" th:text="${s.nome}"></option>
                    </select>
                </div>
            </div>

            <div class="flex-group">
                <div class="input-group">
                    <label>Gol Home</label>
                    <input type="number" th:field="*{golHome}" min="0">
                </div>
                <div class="input-group">
                    <label>Gol Away</label>
                    <input type="number" th:field="*{golAway}" min="0">
                </div>
            </div>

            <div class="input-group">
                <label>Arbitro (Opzionale)</label>
                <select th:field="*{arbitro}">
                    <option value="">-- Da assegnare --</option>
                    <option th:each="a : ${arbitri}" 
                            th:value="${a.id}" 
                            th:text="${a.nome + ' ' + a.cognome}">Nome Cognome
                    </option>
                </select>
            </div>

            <button type="submit">Salva Partita</button>
        </form>

        <p style="text-align: center; margin-top: 20px;">
            <a th:href="@{/admin/partite}" style="color: #6c757d; text-decoration: none;">&larr; Annulla</a>
        </p>
    </div>

    <script th:inline="javascript">
        /*<![CDATA[*/
        document.addEventListener('DOMContentLoaded', function() {
            const torneoSelect = document.getElementById('torneoSelect');
            const squadraHomeSelect = document.getElementById('squadraHomeSelect');
            const squadraAwaySelect = document.getElementById('squadraAwaySelect');

            const selectedHomeId = /*[[${partita.squadraHome != null ? partita.squadraHome.id : null}]]*/ null;
            const selectedAwayId = /*[[${partita.squadraAway != null ? partita.squadraAway.id : null}]]*/ null;

            let tutteLeSquadre = [];

            function popolaSelect() {
                const homeId = squadraHomeSelect.value;
                const awayId = squadraAwaySelect.value;

                const prevHome = homeId || String(selectedHomeId);
                const prevAway = awayId || String(selectedAwayId);

                squadraHomeSelect.innerHTML = '<option value="">-- Squadra Home --</option>';
                squadraAwaySelect.innerHTML = '<option value="">-- Squadra Away --</option>';

                tutteLeSquadre.forEach(s => {
                    const sid = String(s.id);
                    if (sid !== prevAway)
                        squadraHomeSelect.innerHTML += `<option value="${s.id}" ${sid === prevHome ? 'selected' : ''}>${s.nome}</option>`;
                    if (sid !== prevHome)
                        squadraAwaySelect.innerHTML += `<option value="${s.id}" ${sid === prevAway ? 'selected' : ''}>${s.nome}</option>`;
                });
            }

            function aggiornaSquadreDaTorneo() {
                const torneoId = torneoSelect.value;

                if (!torneoId) {
                    squadraHomeSelect.innerHTML = '<option value="">-- Seleziona prima un torneo --</option>';
                    squadraAwaySelect.innerHTML = '<option value="">-- Seleziona prima un torneo --</option>';
                    return;
                }

                fetch('/api/tornei/' + torneoId + '/squadre')
                    .then(response => response.json())
                    .then(squadre => {
                        tutteLeSquadre = squadre;
                        popolaSelect();
                        squadraHomeSelect.addEventListener('change', popolaSelect);
                        squadraAwaySelect.addEventListener('change', popolaSelect);
                    })
                    .catch(error => console.error("Errore AJAX squadre:", error));
            }

            torneoSelect.addEventListener('change', aggiornaSquadreDaTorneo);

            if (torneoSelect.value) {
                aggiornaSquadreDaTorneo();
            }
        });
        /*]]>*/
    </script>

</body>
</html>
