<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestione Arbitri - Admin</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f8f9fa; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #ffc107; color: #000; }
        .btn { padding: 10px 15px; border-radius: 5px; text-decoration: none; font-weight: bold; display: inline-block; }
        .btn-add { background-color: #28a745; color: white; margin-bottom: 15px; }
        .btn-edit { background-color: #007bff; color: white; padding: 5px 10px; font-size: 14px; }
        .btn-del { background-color: #dc3545; color: white; padding: 5px 10px; font-size: 14px; border: none; cursor: pointer; }
        .azioni-container { display: flex; align-items: center; gap: 8px; }
        .azioni-container form { margin: 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gestione Arbitri</h1>
        
        <a th:href="@{/admin/arbitro/new}" class="btn btn-add">+ Aggiungi Nuovo Arbitro</a>

        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Cognome</th>
                    <th>Codice Arbitrale</th>
                    <th>Azioni</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="arbitro : ${arbitri}">
                    <td th:text="${arbitro.nome}">Nome</td>
                    <td th:text="${arbitro.cognome}">Cognome</td>
                    <td th:text="${arbitro.codiceArbitrale}">Codice</td>
                    <td>
                        <div class="azioni-container">
                            <a th:href="@{/admin/arbitro/modifica/{id}(id=${arbitro.id})}" class="btn btn-edit">Modifica</a>
                            
                            <form th:action="@{/admin/arbitro/{id}/delete(id=${arbitro.id})}" method="post" 
                                  onsubmit="return confirm('Sicuro di voler eliminare questo arbitro? Le partite associate rimarranno senza direttore di gara.');">
                                <button type="submit" class="btn btn-del">Elimina</button>
                            </form>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>

        <p style="margin-top: 30px;">
            <a th:href="@{/admin/dashboard}" style="color: #6c757d; text-decoration: none;">&larr; Torna alla Dashboard</a>
        </p>
    </div>
</body>
</html>
