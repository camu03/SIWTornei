<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestione Partite - Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>

    <div th:replace="~{fragments :: navbar}"></div>

    <div class="container">
        <h1>Gestione Partite</h1>
        
        <a th:href="@{/admin/partite/nuova}" class="btn btn-add">+ Aggiungi Nuova Partita</a>

        <table>
            <thead>
                <tr>
                    <th>Data e Ora</th>
                    <th>Torneo</th>
                    <th>Squadra Home</th>
                    <th>Risultato</th>
                    <th>Squadra Away</th>
                    <th>Stato</th>
                    <th>Azioni</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="partita : ${partite}">
                    <td th:text="${#temporals.format(partita.dataOra, 'dd/MM/yyyy HH:mm')}">Data</td>
                    <td th:text="${partita.torneo != null ? partita.torneo.nome : '-'}">Torneo</td>
                    <td th:text="${partita.squadraHome != null ? partita.squadraHome.nome : '-'}">Home</td>
                    <td class="score">
                        <span th:text="${partita.golHome != null ? partita.golHome : '0'}"></span> : 
                        <span th:text="${partita.golAway != null ? partita.golAway : '0'}"></span>
                    </td>
                    <td th:text="${partita.squadraAway != null ? partita.squadraAway.nome : '-'}">Away</td>
                    <td th:text="${partita.stato}">Stato</td>
                    <td style="text-align: right;"><div class="azioni-container">
                            <a th:href="@{/admin/partite/modifica/{id}(id=${partita.id})}" class="btn btn-edit">Modifica</a>
                            <form th:action="@{/admin/partite/{id}/delete(id=${partita.id})}" method="post"
                                  onsubmit="return confirm('Sicuro di voler eliminare questa partita?');">
                                <button type="submit" class="btn btn-del">Elimina</button>
                            </form>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>

        <p style="margin-top: 30px; text-align: left;">
            <a th:href="@{/admin/dashboard}" class="back-link">&larr; Torna alla Dashboard</a>
        </p>
    </div>
</body>
</html>
