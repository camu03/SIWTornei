<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuovo Torneo</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>

    <div th:replace="~{fragments :: navbar}"></div>

    <div class="form-container">
        <h2 th:text="${torneo.id == null ? 'Inserisci Nuovo Torneo' : 'Modifica Torneo'}">Inserisci Nuovo Torneo</h2>

        <!-- Passiamo gli ID delle squadre già associate come variabile JS -->
        <div id="squadreGiaAssociate"
             th:attr="data-ids=${#strings.listJoin(squadreIds, ',')}">
        </div>

        <form th:action="@{/admin/tornei/salva}" method="POST" th:object="${torneo}">

            <input type="hidden" th:field="*{id}">

            <div class="input-group">
                <label>Nome Torneo</label>
                <input type="text" th:field="*{nome}" required>
            </div>

            <div class="input-group">
                <label>Anno</label>
                <input type="number" th:field="*{anno}" required min="2000" max="2100">
            </div>

            <div class="input-group">
                <label>Descrizione</label>
                <textarea th:field="*{descrizione}" rows="3" required></textarea>
            </div>

            <div class="input-group">
                <label>Squadre Partecipanti</label>
                <button type="button" class="btn btn-edit" style="width: 100%; margin-top: 0;" onclick="openModal()">
                    Gestisci Squadre Iscritte
                </button>
                <div style="text-align: center; margin-top: 8px;">
                    <span id="contatoreSquadre" style="color: #555; font-size: 14px; font-weight: bold;">0 squadre selezionate</span>
                </div>
            </div>

            <div id="squadreModal" class="modal-overlay">
                <div class="modal-content">
                    <h3 style="margin-top: 0; border-bottom: 1px solid #ddd; padding-bottom: 10px;">Seleziona le Squadre</h3>

                    <div class="modal-body">
                        <div th:if="${tutteLeSquadre == null or tutteLeSquadre.isEmpty()}">
                            <small style="color: #666;">Nessuna squadra presente nel sistema.</small>
                        </div>

                        <div th:each="squadra : ${tutteLeSquadre}" style="margin-bottom: 8px;">
                            <input type="checkbox"
                                   name="squadreIds"
                                   th:value="${squadra.id}"
                                   th:id="'squadra_' + ${squadra.id}"
                                   style="width: auto; display: inline-block; margin-right: 8px;"
                                   onchange="aggiornaContatore()"/>
                            <label th:for="'squadra_' + ${squadra.id}" th:text="${squadra.nome}"
                                   style="display: inline-block; font-weight: normal; margin-bottom: 0; cursor: pointer;"></label>
                        </div>
                    </div>

                    <button type="button" class="btn btn-add" style="width: 100%; margin-bottom: 0;" onclick="closeModal()">
                        Conferma Selezione
                    </button>
                </div>
            </div>

            <button type="submit">Salva Torneo</button>
        </form>

        <p style="text-align: center; margin-top: 20px;">
            <a th:href="@{/admin/tornei}" style="color: #6c757d; text-decoration: none;">&larr; Annulla</a>
        </p>
    </div>

    <script>
        function openModal() {
            document.getElementById('squadreModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('squadreModal').style.display = 'none';
        }

        function aggiornaContatore() {
            let count = document.querySelectorAll('input[name="squadreIds"]:checked').length;
            let testo = count === 1 ? " squadra selezionata" : " squadre selezionate";
            document.getElementById('contatoreSquadre').innerText = count + testo;
        }

        // Pre-spunta le squadre già associate (in modalità modifica)
        window.onload = function() {
            var raw = document.getElementById('squadreGiaAssociate').dataset.ids;
            if (raw) {
                var ids = raw.split(',').map(function(s) { return s.trim(); });
                ids.forEach(function(id) {
                    var cb = document.getElementById('squadra_' + id);
                    if (cb) cb.checked = true;
                });
            }
            aggiornaContatore();
        };
    </script>

</body>
</html>
