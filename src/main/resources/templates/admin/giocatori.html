<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestione Giocatori - Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>

    <div th:replace="~{fragments :: navbar}"></div>

    <div class="container">
        <h1>Gestione Giocatori</h1>
        
        <a th:href="@{/admin/giocatori/nuovo}" class="btn btn-add">+ Aggiungi Nuovo Giocatore</a>

        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Cognome</th>
                    <th>Squadra</th>
                    <th>Azioni</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="giocatore : ${giocatori}">
                    <td th:text="${giocatore.nome}">Nome</td>
                    <td th:text="${giocatore.cognome}">Cognome</td>
                    <td th:text="${giocatore.squadra != null ? giocatore.squadra.nome : 'Nessuna'}">Squadra</td>
                    <td style="text-align: right;"><div class="azioni-container">
                            <a th:href="@{/admin/giocatori/modifica/{id}(id=${giocatore.id})}" class="btn btn-edit">Modifica</a>
                            <form th:action="@{/admin/giocatori/{id}/delete(id=${giocatore.id})}" method="post"
                                  onsubmit="return confirm('Sicuro di voler eliminare questo giocatore?');">
                                <button type="submit" class="btn btn-del">Elimina</button>
                            </form>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>

        <p style="margin-top: 30px;">
            <a th:href="@{/admin/dashboard}" class="back-link">&larr; Torna alla Dashboard</a>
        </p>
    </div>
</body>
</html>
