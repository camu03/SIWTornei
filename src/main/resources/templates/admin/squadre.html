<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestione Squadre - Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>

    <div th:replace="~{fragments :: navbar}"></div>

    <div class="container">
        <h1>Gestione Squadre</h1>
        
        <a th:href="@{/admin/squadre/nuova}" class="btn btn-add">+ Aggiungi Nuova Squadra</a>

        <table>
            <thead>
                <tr>
                    <th>Nome Squadra</th>
                    <th>Città</th>
                    <th>Anno Fondazione</th>
                    <th>Azioni</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="squadra : ${squadre}">
                    <td th:text="${squadra.nome}">Nome</td>
                    <td th:text="${squadra.citta}">Città</td>
                    <td th:text="${squadra.annoFondazione}">Anno</td>
                    <td style="text-align: right;"><div class="azioni-container">
                            <a th:href="@{/admin/squadre/modifica/{id}(id=${squadra.id})}" class="btn btn-edit">Modifica</a>
                            <form th:action="@{/admin/squadre/{id}/delete(id=${squadra.id})}" method="post"
                                  onsubmit="return confirm('Sicuro di voler eliminare questa squadra?');">
                                <button type="submit" class="btn btn-del">Elimina</button>
                            </form>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>

        <p style="margin-top: 30px;">
            <a th:href="@{/admin/dashboard}" class="back-link">&larr; Torna alla Dashboard</a>
        </p>
    </div>
</body>
</html>
