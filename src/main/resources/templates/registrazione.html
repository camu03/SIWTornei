<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registrazione - SIW Tornei</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body class="registration-page">

    <div th:replace="~{fragments :: navbar}"></div>

    <div class="form-container reg-container">
        <h2>Crea il tuo Account</h2>
        
        <form th:action="@{/registrazione}" method="POST" th:object="${utente}">
            <div class="input-group">
                <label>Username</label>
                <input type="text" th:field="*{username}" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" th:field="*{password}" required>
            </div>

            <label>Seleziona il tuo ruolo:</label>
            
            <div th:if="${erroreRuolo}" class="error" th:text="${erroreRuolo}" style="text-align: left; margin-bottom: 5px; font-weight: bold;">
                Testo di errore
            </div>
            
            <div class="role-group">
                <div class="radio-item">
                    <input type="radio" id="roleUser" name="ruolo" value="USER" th:field="*{ruolo}" required>
                        <label for="roleUser" style="margin: 0;">UTENTE</label>
                </div>
                <div class="radio-item">
                    <input type="radio" id="roleAdmin" name="ruolo" value="ADMIN" th:field="*{ruolo}" required>
                    <label for="roleAdmin" style="margin: 0;">ADMIN</label>
                </div>
            </div>

            <button type="submit">Completa Registrazione</button>
        </form>
        
        <p style="text-align: center; margin-top: 20px;">
                <a th:href="@{/login}" class="back-link" style="font-size: 14px;">Hai già un account? Accedi</a>
        </p>
    </div>
</body>
</html>
