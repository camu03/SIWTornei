<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Elenco Tornei</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        .torneo-card { 
            border: 1px solid #ccc; 
            padding: 20px; 
            width: 50%; 
            margin: 15px auto; 
            border-radius: 8px; 
            text-align: left; 
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }
        .titolo-torneo { font-size: 24px; color: #007bff; text-decoration: none; font-weight: bold; }
        .titolo-torneo:hover { text-decoration: underline; }
        .indietro { display: block; margin-top: 30px; color: #6c757d; text-decoration: none; }
    </style>
</head>
<body>

    <h1>Tornei Disponibili</h1>

    <div th:if="${tornei.isEmpty()}">
        <p>Al momento non ci sono tornei in programma. Torna a trovarci presto!</p>
    </div>

    <div th:unless="${tornei.isEmpty()}">
        <div th:each="torneo : ${tornei}" class="torneo-card">
            
            <a th:href="@{/torneo/{id}(id=${torneo.id})}" th:text="${torneo.nome}" class="titolo-torneo">Nome Torneo</a>
            
            <p><strong>Edizione:</strong> <span th:text="${torneo.anno}">2026</span></p>
            <p><em th:text="${torneo.descrizione}">Descrizione del torneo</em></p>
            
        </div>
    </div>

    <a th:href="@{/}" class="indietro">← Torna alla Home Page</a>

</body>
</html>
