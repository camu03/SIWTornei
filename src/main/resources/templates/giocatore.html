<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Profilo Giocatore</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body class="player-page">

    <div th:replace="~{fragments :: navbar}"></div>

    <div class="container player-container" style="text-align: left;">
        <h1 class="player-title" th:text="${giocatore.nome} + ' ' + ${giocatore.cognome}">Mario Rossi</h1>

        <div class="info-riga">
            <span class="label">Ruolo:</span> 
            <span th:text="${giocatore.ruolo}">Attaccante</span> </div>

        <div class="info-riga">
            <span class="label">Data di Nascita:</span> 
            <span th:text="${#temporals.format(giocatore.dataDiNascita, 'dd/MM/yyyy')}">01/01/1990</span>
        </div>

        <div class="info-riga">
            <span class="label">Altezza:</span> 
            <span th:text="${giocatore.altezza} + ' cm'">180 cm</span> </div>

        <div class="info-riga">
            <span class="label">Squadra:</span> 
            <a th:href="@{/squadra/{id}(id=${giocatore.squadra.id})}" th:text="${giocatore.squadra.nome}">Nome Squadra</a>
        </div>
        
        <hr>

        <a href="javascript:history.back()" class="back-link">&larr; Torna al roster della squadra</a>
    </div>

</body>
</html>
