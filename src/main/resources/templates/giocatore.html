<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Profilo Giocatore</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        .profilo-box { 
            border: 1px solid #ccc; 
            padding: 30px; 
            width: 45%; 
            margin: 0 auto; 
            border-radius: 8px; 
            box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
            text-align: left; /* Allineamento a sinistra per i dettagli */
        }
        .nome-titolo { 
            color: #007bff; 
            font-size: 32px; 
            margin-bottom: 20px; 
            text-align: center; 
            border-bottom: 2px solid #007bff;
            padding-bottom: 10px;
        }
        .info-riga { margin-bottom: 12px; font-size: 18px; }
        .label { font-weight: bold; color: #555; display: inline-block; width: 150px; }
        .indietro { display: block; margin-top: 30px; text-align: center; color: #007bff; text-decoration: none; }
        .indietro:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="profilo-box">
        <h1 class="nome-titolo" th:text="${giocatore.nome} + ' ' + ${giocatore.cognome}">Mario Rossi</h1>

        <div class="info-riga">
            <span class="label">Ruolo:</span> 
            <span th:text="${giocatore.ruolo}">Attaccante</span> </div>

        <div class="info-riga">
            <span class="label">Data di Nascita:</span> 
            <span th:text="${#temporals.format(giocatore.dataDiNascita, 'dd/MM/yyyy')}">01/01/1990</span>
        </div>

        <div class="info-riga">
            <span class="label">Altezza:</span> 
            <span th:text="${giocatore.altezza} + ' cm'">180 cm</span> </div>

        <div class="info-riga">
            <span class="label">Squadra:</span> 
            <a th:href="@{/squadra/{id}(id=${giocatore.squadra.id})}" th:text="${giocatore.squadra.nome}">Nome Squadra</a>
        </div>
        
        <hr>

        <a href="javascript:history.back()" class="indietro">&larr; Torna al roster della squadra</a>
    </div>

</body>
</html>
