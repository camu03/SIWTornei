<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>I Nostri Arbitri - SIW Tornei</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body class="listing-page">

    <div th:replace="~{fragments :: navbar}"></div>

    <div class="hero listing-hero">
        <h1>I Direttori di Gara</h1>
        <p>Ecco gli arbitri ufficiali che partecipano ai nostri tornei.</p>
    </div>

    <div class="container listing-container">
        <div th:if="${arbitri.isEmpty()}">
            <p class="empty-state">Al momento non ci sono arbitri registrati nel sistema.</p>
        </div>

        <div th:each="arbitro : ${arbitri}" class="card listing-card">
            <div>
                <span class="listing-title" th:text="${arbitro.nome} + ' ' + ${arbitro.cognome}">Nome Cognome</span>
            </div>
            <a class="listing-link" th:href="@{/arbitro/{id}(id=${arbitro.id})}">Vedi Profilo &rarr;</a>
        </div>

        <a th:href="@{/}" class="back-link">&larr; Torna alla Home</a>
    </div>
</body>
</html>
