<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Squadre - SIW Tornei</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body class="listing-page">

    <div th:replace="~{fragments :: navbar}"></div>

    <div class="hero listing-hero">
        <h1>Squadre iscritte a: <span th:text="${torneo.nome}">Nome Torneo</span></h1>
        <p>Le squadre partecipanti al torneo e i relativi dettagli.</p>
    </div>

    <div class="container listing-container" style="text-align: center;">
        <h2 class="home-section-title" style="border: none;">Elenco Squadre</h2>

        <div th:if="${torneo.squadre.isEmpty()}">
            <p class="empty-state">Non ci sono ancora squadre iscritte a questo torneo.</p>
        </div>

        <div th:unless="${torneo.squadre.isEmpty()}" class="grid tournaments-grid">
            <div th:each="squadra : ${torneo.squadre}" class="card torneo-card">
                <h3 style="margin: 0;">
                    <a th:href="@{/squadra/{id}(id=${squadra.id})}" th:text="${squadra.nome}" class="titolo-torneo">Nome Squadra</a>
                </h3>
            </div>
        </div>

        <a th:href="@{/torneo/{id}(id=${torneo.id})}" class="back-link">&larr; Torna al Torneo</a>
    </div>

</body>
</html>
