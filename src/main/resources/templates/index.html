<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>SIW Tornei - Home</title>
    <style>
        /* CSS per il tasto in alto a destra */
        .top-bar { position: absolute; top: 20px; right: 20px; }
        .btn-auth { padding: 8px 16px; border-radius: 5px; text-decoration: none; font-weight: bold; }
        .btn-login { background-color: #007bff; color: white; }
        .btn-logout { background-color: #dc3545; color: white; }
        
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 100px; }
        .admin-section { background-color: #fff3cd; border: 1px solid #ffeeba; padding: 20px; margin: 20px auto; width: 50%; border-radius: 10px; }
        .nav-links a { margin: 0 15px; font-size: 18px; color: #007bff; text-decoration: none; }
    </style>
</head>
<body>

    <div class="top-bar">
        <a th:href="@{/login}" class="btn-auth btn-login" sec:authorize="isAnonymous()">Login</a>
        
        <span sec:authorize="isAuthenticated()" style="margin-right: 10px;">
            Benvenuto, <strong sec:authentication="principal.username">User</strong>
        </span>
        <form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()" style="display: inline;">
    <button type="submit" class="btn-auth btn-logout" style="border: none; cursor: pointer;">
        Logout
    </button>
</form>
    </div>

    <h1>Benvenuti nel Portale Tornei</h1>
    <p>Esplora i tornei amatoriali, le squadre e le classifiche aggiornate in tempo reale.</p>

    <div class="nav-links">
        <a th:href="@{/tornei}">Visualizza Tornei</a>
    </div>

    <div class="admin-section" sec:authorize="hasAuthority('ADMIN')">
        <h3>Pannello di Gestione</h3>
        <p>Hai effettuato l'accesso come amministratore. Puoi gestire i tornei e i risultati.</p>
        <a th:href="@{/admin/dashboard}" style="color: #856404; font-weight: bold;">Accedi alla Dashboard Admin &rarr;</a>
    </div>

</body>
</html>
