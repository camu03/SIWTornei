<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SIW Tornei - Home</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body class="home-page">

    <div th:replace="~{fragments :: navbar}"></div>

    <div class="hero">
        <h1>Benvenuto su SIW Tornei</h1>
        <p>Il portale definitivo per gestire e seguire i tuoi tornei di calcio amatoriale.</p>
        <a th:href="@{/tornei}" class="btn btn-edit home-cta">Esplora i Tornei</a>
        <a th:href="@{/admin/dashboard}" sec:authorize="hasAuthority('ADMIN')" class="btn btn-edit home-cta">Dashboard Admin</a>
    </div>

    <div class="container home-intro" style="text-align: center;">
        <h2 class="home-section-title" style="border: none;">Partite Del Giorno</h2>
        
        <div th:if="${#lists.isEmpty(partiteOggi)}" style="margin-top: 40px;">
        <p class="empty-state">Nessuna partita in programma per oggi.</p>
    </div>

    <div th:unless="${#lists.isEmpty(partiteOggi)}" class="grid" style="margin-top: 40px;">
        <div th:each="partita : ${partiteOggi}" class="card">
            <h3 th:text="${partita.squadraHome.nome} + ' vs ' + ${partita.squadraAway.nome}">Casa vs Ospite</h3>
            <p th:text="${#temporals.format(partita.dataOra, 'HH:mm')}">15:00</p>
            <p th:text="${partita.luogo}">Luogo</p>
            <a th:href="@{/partita/{id}(id=${partita.id})}" class="btn btn-edit">Dettagli</a>
        </div>
    </div>
    </div>

    <!--<div th:replace="~{fragments :: footer}"></div>-->

</body>
</html>
