<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - SIW Tornei</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f7f6; }
        .login-container { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; }
        h2 { text-align: center; color: #333; margin-bottom: 25px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #666; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        
        /* Bottoni */
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background-color: #0056b3; }
        
        /* Stile specifico per il bottone di registrazione */
        .btn-registrati { display: block; width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; text-decoration: none; text-align: center; box-sizing: border-box; margin-top: 10px; }
        .btn-registrati:hover { background-color: #218838; }

        .error { color: #dc3545; text-align: center; margin-bottom: 15px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Accedi al Sistema</h2>
        
        <div th:if="${param.error}" class="error">
            Username o password errati. Riprova.
        </div>

        <form th:action="@{/login}" method="POST">
            <div class="input-group">
                <label>Username</label>
                <input type="text" name="username" required autofocus>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit">Entra</button>
        </form>
        
        <div style="margin-top: 25px; border-top: 1px solid #eee; padding-top: 15px; text-align: center;">
            <p style="font-size: 14px; color: #666; margin-bottom: 10px;">Non hai un account?</p>
            <a th:href="@{/registrazione}" class="btn-registrati">Registrati</a>
        </div>
        
        <p style="text-align: center; margin-top: 20px;">
            <a th:href="@{/}" style="color: #6c757d; text-decoration: none; font-size: 14px;">&larr; Torna alla Home</a>
        </p>
    </div>
</body>
</html>
