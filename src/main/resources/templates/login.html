<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - SIW Tornei</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body class="login-page">

    <div th:replace="~{fragments :: navbar}"></div>

    <div class="form-container login-container">
        <h2>Accedi al Sistema</h2>
        
        <div th:if="${param.error}" class="error">
            Username o password errati. Riprova.
        </div>

        <form th:action="@{/login}" method="POST">
            <div class="input-group">
                <label>Username</label>
                <input type="text" name="username" required autofocus>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>

            <input type="hidden" name="redirect" th:value="${param.redirect}" th:if="${param.redirect != null}">

            <button type="submit">Entra</button>
        </form>
        
        <div style="margin-top: 25px; border-top: 1px solid #ddd; padding-top: 15px; text-align: center;">
            <p style="font-size: 14px; color: #333; margin-bottom: 10px;">Non hai un account?</p>
            <a th:href="@{/registrazione}" class="btn-registrati">Registrati</a>
        </div>
        
        <p style="text-align: center; margin-top: 20px;">
            <a th:href="@{/}" class="back-link" style="font-size: 14px;">&larr; Torna alla Home</a>
        </p>
    </div>
</body>
</html>
