<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dettaglio Partita</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .tabellone { 
            background-color: #343a40; color: white; padding: 30px; 
            border-radius: 10px; text-align: center; margin-bottom: 30px;
        }
        .squadre { font-size: 2em; font-weight: bold; }
        .risultato { font-size: 3em; color: #ffc107; margin: 15px 0; }
        .info-extra { color: #ccc; font-size: 1.1em; }
        .commenti-section { background-color: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #ddd; }
        .singolo-commento { border-bottom: 1px solid #ccc; padding: 10px 0; }
        .form-commento { margin-top: 20px; }
        textarea { width: 100%; height: 80px; padding: 10px; border-radius: 5px; border: 1px solid #ccc; margin-bottom: 10px; }
        .bottone { background-color: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
        .bottone:hover { background-color: #0056b3; }
        .indietro { display: inline-block; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="tabellone">
        <div class="squadre">
            <span th:text="${partita.squadraHome.nome}">Casa</span> 
            - 
            <span th:text="${partita.squadraAway.nome}">Trasferta</span>
        </div>

        <div th:if="${partita.stato.name() == 'PLAYED'}" class="risultato">
            <span th:text="${partita.golHome}">0</span> : <span th:text="${partita.golAway}">0</span>
        </div>
        <div th:unless="${partita.stato.name() == 'PLAYED'}" class="risultato" style="font-size: 1.5em; color: #17a2b8;">
            In programma il: <span th:text="${partita.dataOra}">01/01/2026</span>
        </div>

        <div class="info-extra">
            <span th:if="${partita.arbitro != null}">
                Arbitro: <strong th:text="${partita.arbitro.nome} + ' ' + ${partita.arbitro.cognome}">Nome Arbitro</strong>
            </span>
            <span th:unless="${partita.arbitro != null}">
                Arbitro: <em>Da assegnare</em>
            </span>
        </div>
    </div>

    <div class="commenti-section">
        <h2>Commenti dei tifosi</h2>

        <div th:if="${partita.commenti.isEmpty()}">
            <p>Nessun commento per questa partita. Sii il primo a commentare!</p>
        </div>
        <div th:unless="${partita.commenti.isEmpty()}">
            <div th:each="commento : ${partita.commenti}" class="singolo-commento">
                <p>
                    <strong>Un tifoso dice:</strong> 
                    <span th:text="${commento.testo}">Bellissima partita!</span>
                </p>
            </div>
        </div>

        <div class="form-commento">
            <h3>Aggiungi un commento</h3>
            <form th:action="@{/user/partita/{partitaId}/commento(partitaId=${partita.id})}" method="post">
                <textarea name="testo" placeholder="Scrivi qui la tua opinione..." required></textarea>
                <br>
                <button type="submit" class="bottone">Invia Commento</button>
            </form>
        </div>
        </div>

    <a href="javascript:history.back()" class="indietro">&larr; Torna al calendario</a>

</body>
</html>
