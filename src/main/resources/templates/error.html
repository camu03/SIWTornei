<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Errore - SIW Tornei</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container" style="text-align: center; padding: 80px 20px;">
        <h1 style="font-size: 6rem; margin: 0; color: #c0392b;" th:text="${status}">404</h1>
        <h2 th:text="${error}">Pagina non trovata</h2>
        <p style="color: #666; margin: 20px 0;" th:text="${message}">Si è verificato un errore.</p>
        <a href="/" class="btn btn-edit" style="display: inline-block; margin-top: 20px;">
            Torna alla Home
        </a>
    </div>
</body>
</html>
