<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Profilo Arbitro</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body class="player-page">

    <div th:replace="~{fragments :: navbar}"></div>

    <div class="container player-container" style="text-align: left;">
        <h1 class="player-title">Scheda Arbitro</h1>

        <div class="info-riga"><span class="label">Nome:</span> <span th:text="${arbitro.nome}">Mario</span></div>
        <div class="info-riga"><span class="label">Cognome:</span> <span th:text="${arbitro.cognome}">Rossi</span></div>
        <div class="info-riga"><span class="label">Codice Arbitrale:</span> <span th:text="${arbitro.codiceArbitrale}">A123BC</span></div>

        <a th:href="@{/arbitri}" class="back-link">&larr; Torna all'elenco</a>
    </div>
</body>
</html>
