<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${torneo.nome}">Dettaglio Torneo</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body class="torneo-page">

    <div th:replace="~{fragments :: navbar}"></div>

    <div class="hero torneo-hero">
        <h1 th:text="${torneo.nome}">Nome del Torneo</h1>
        <p>Dettagli, squadre partecipanti, calendario e classifica.</p>
    </div>

    <div class="container torneo-container" style="text-align: center;">

        <div class="card torneo-card" style="max-width: 600px; margin: 0 auto; text-align: left; padding: 30px;">
            
            <p><strong>Edizione:</strong> <span th:text="${torneo.anno}">2026</span></p>
            <p><em th:text="${torneo.descrizione}">Descrizione del torneo</em></p>
        </div>

        <h2 style="margin-top: 40px; border: none;">Esplora il Torneo:</h2>

        <div style="display: flex; justify-content: center; gap: 20px; margin-top: 20px; flex-wrap: wrap;">
            <a th:href="@{/torneo/{id}/squadre(id=${torneo.id})}" class="btn btn-dark btn-lg">Squadre Partecipanti</a>
            <a th:href="@{/torneo/{id}/partite(id=${torneo.id})}" class="btn btn-dark btn-lg">Calendario e Risultati</a>
            <a th:href="@{/torneo/{id}/classifica(id=${torneo.id})}" class="btn btn-dark btn-lg">Classifica</a>
        </div>  

        <p style="margin-top: 40px;">
            <a th:href="@{/tornei}" class="back-link">&larr; Torna alla lista dei tornei</a>
        </p>
    </div>

</body>
</html>
