<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Calendario - <span th:text="${torneo.nome}">Torneo</span></title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .partita-card { 
            border: 1px solid #ddd; 
            padding: 15px; 
            margin-bottom: 15px; 
            border-radius: 5px; 
            background-color: #f9f9f9;
        }
        .squadre { font-size: 1.2em; font-weight: bold; color: #333; }
        .risultato { font-size: 1.5em; color: #d9534f; margin: 10px 0; font-weight: bold; }
        .data { color: #555; font-style: italic; }
        .dettagli-link { display: inline-block; margin-top: 10px; font-size: 0.9em; }
        .indietro { display: block; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>Calendario Partite: <span th:text="${torneo.nome}">Nome Torneo</span></h1>

    <div th:if="${partite.isEmpty()}">
        <p>Il calendario per questo torneo non è ancora stato stilato.</p>
    </div>

    <div th:unless="${partite.isEmpty()}">
        
        <div th:each="partita : ${partite}" class="partita-card">
            
            <div class="squadre">
                <span th:text="${partita.squadraHome.nome}">Squadra Casa</span> 
                vs 
                <span th:text="${partita.squadraAway.nome}">Squadra Trasferta</span>
            </div>

            <div th:if="${partita.stato.name() == 'PLAYED'}" class="risultato">
                <span th:text="${partita.golHome}">0</span> - <span th:text="${partita.golAway}">0</span>
            </div>

            <div th:unless="${partita.stato.name() == 'PLAYED'}" class="data">
                In programma il: <span th:text="${partita.dataOra}">01/01/2026 15:00</span>
            </div>

            <a th:href="@{/partita/{id}(id=${partita.id})}" class="dettagli-link">Vai al Match Center &rarr;</a>

        </div>
        
    </div>

    <a th:href="@{/torneo/{id}(id=${torneo.id})}" class="indietro">Torna al Torneo</a>

</body>
</html>
