<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Classifica - SIW Tornei</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body class="classifica-page">

    <div th:replace="~{fragments :: navbar}"></div>

    <div class="hero">
        <h1>Classifica: <span th:text="${torneo.nome}">Nome Torneo</span></h1>
        <p>Consulta la graduatoria aggiornata del torneo.</p>
    </div>

    <div class="container classifica-container" style="text-align: center;">
        <div th:if="${classifica.isEmpty()}">
            <p class="empty-state">Nessun dato disponibile per la classifica.</p>
        </div>

        <table th:unless="${classifica.isEmpty()}" class="classifica-table">
            <thead>
                <tr>
                    <th class="posizione">#</th>
                    <th>Squadra</th>
                    <th>Punti Totali</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="entry, iterStat : ${classifica}">
                    <td class="posizione" th:text="${iterStat.count}">1</td>
                    <td>
                        <a th:href="@{/squadra/{id}(id=${entry.key.id})}" th:text="${entry.key.nome}">Nome Squadra</a>
                    </td>
                    <td class="punti" th:text="${entry.value}">0</td>
                </tr>
            </tbody>
        </table>

        <a th:href="@{/torneo/{id}(id=${torneo.id})}" class="back-link">Torna al Torneo</a>
    </div>

</body>
</html>
