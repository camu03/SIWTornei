# Configurazione Server
spring.application.name=siwtornei
server.port=8080

# Configurazione PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/siw_tornei
spring.datasource.username=postgres
spring.datasource.password=Postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Configurazione JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Configurazione Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Logging
logging.level.org.springframework=INFO
# Ho aggiornato il package con quello del tuo progetto attuale per vedere i log giusti
logging.level.it.uniroma3.siw.siwtornei=DEBUG

# Configurazione Upload File (Utile se in futuro vorrai far caricare i loghi delle squadre!)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Dice a Spring di aspettare la creazione delle tabelle prima di inserire i dati
spring.jpa.defer-datasource-initialization=true

# Assicura che il file data.sql venga letto sempre
spring.sql.init.mode=never

spring.sql.init.encoding=UTF-8